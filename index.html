<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강치타 LIVE</title>

<style>
/* 기본 스타일 */
body{
  margin:0;
  background:#0e0e10;
  color:white;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* 배너 */
.banner-container{
  position:relative;
  width:100%;
  height:420px;
  overflow:hidden;
}
.banner-container img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition: transform 0.5s;
}
.banner-container img:hover{
  transform: scale(1.05);
}
.banner-overlay{
  position:absolute;
  bottom:20px;
  left:20px;
  color:white;
  font-size:32px;
  font-weight:bold;
  text-shadow: 2px 2px 10px black;
  animation: fadeInOut 2s infinite;
}

/* 깜빡임 애니메이션 */
@keyframes fadeInOut{
  0%, 50%, 100%{ opacity:1; }
  25%, 75%{ opacity:0.5; }
}

/* 프로필 영역 */
.profile-box{
  display:flex;
  align-items:center;
  gap:20px;
  padding:20px 40px;
  background:#18181b;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  border-radius:10px;
  margin:20px;
}

.profile-img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:4px solid #9147ff;
  object-fit:cover;
}

.name{
  font-size:28px;
  font-weight:bold;
}

.live{
  background:red;
  padding:5px 10px;
  margin-left:10px;
  border-radius:6px;
  font-size:14px;
  animation: liveBlink 1s infinite;
}

/* LIVE 깜빡임 */
@keyframes liveBlink{
  0%, 50%, 100%{ opacity:1; }
  25%, 75%{ opacity:0.3; }
}

/* 통계 */
.stats{
  display:flex;
  gap:40px;
  margin-top:10px;
  color:#aaa;
}
.stats div{
  display:flex;
  align-items:center;
  gap:5px;
  font-size:14px;
}

/* 버튼 */
.buttons{
  padding:30px 40px;
  display:flex;
  gap:15px;
  margin:20px;
}
.btn{
  background:#9147ff;
  padding:12px 20px;
  border-radius:8px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  transition: transform 0.2s, background 0.2s, box-shadow 0.3s;
}
.btn:hover{
  background:#a970ff;
  transform: scale(1.05);
  box-shadow: 0 0 15px #9147ff;
}

/* 방송 영역 */
.stream{
  padding:40px;
  margin:20px;
  background:#18181b;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  border-radius:10px;
}
.stream h2{
  margin-bottom:20px;
  font-size:24px;
}
.stream iframe{
  width:100%;
  height:500px;
  border:none;
  border-radius:10px;
}

/* 미세 애니메이션 효과 */
.stream iframe:hover{
  transform: scale(1.01);
  transition: transform 0.3s;
}
</style>
</head>

<body>

<!-- 배너 -->
<div class="banner-container">
  <img src="https://github.com/MI1268/gangchita/blob/main/%EB%B0%B0%EB%84%88.png?raw=true" alt="강치타 배너">
  <div class="banner-overlay">오늘도 치타와 함께!</div>
</div>

<!-- 프로필 -->
<div class="profile-box">
  <img class="profile-img" src="profile.webp" alt="강치타 프로필">
  <div>
    <div class="name">
      강치타
      <span class="live">LIVE</span>
    </div>
    <div class="stats">
      <div>👁‍🗨 7,800</div>
      <div>⭐ 96,000</div>
      <div>⏰ 21:00 ~ 03:00</div>
    </div>
  </div>
</div>

<!-- 버튼 -->
<div class="buttons">
  <a class="btn" href="#">치지직 방송</a>
  <a class="btn" href="#">유튜브</a>
  <a class="btn" href="#">디스코드</a>
  <a class="btn" href="#">후원</a>
</div>

<!-- 방송 영역 -->
<div class="stream">
  <h2>LIVE STREAM</h2>
  <iframe src="https://player.twitch.tv/?channel=gangchita&parent=localhost" allowfullscreen></iframe>
</div>

</body>
</html>
