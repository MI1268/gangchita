<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강치타 스트리밍</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0f0f17;
color:white;
text-align:center;
}

.banner{
width:100%;
height:220px;
object-fit:cover;
}

.profile{
margin-top:-70px;
}

.profile img{
width:140px;
border-radius:50%;
border:5px solid #0f0f17;
}

.name{
font-size:34px;
margin-top:10px;
}

.desc{
color:#aaa;
margin-bottom:20px;
}

.stats{
display:flex;
justify-content:center;
gap:40px;
margin-bottom:30px;
}

.stat{
font-size:18px;
}

.buttons{
max-width:300px;
margin:auto;
}

.btn{
display:block;
background:#7b5cff;
padding:14px;
margin:10px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
}

.btn:hover{
background:#9279ff;
}

.section{
margin-top:50px;
}

</style>
</head>

<body>

<img class="banner" src="banner.jpg">

<div class="profile">
<img src="profile.png">
</div>

<div class="name">강치타</div>
<div class="desc">치지직 스트리머 🎮</div>

<div class="stats">

<div class="stat">
👥 평균 시청자<br>
<b>7,500</b>
</div>

<div class="stat">
❤️ 팔로워<br>
<b>86,500</b>
</div>

<div class="stat">
🕘 방송시간<br>
<b>21:00 ~ 03:00</b>
</div>

</div>

<div class="buttons">

<a class="btn" href="#">치지직 방송</a>

<a class="btn" href="#">유튜브</a>

<a class="btn" href="#">디스코드</a>

<a class="btn" href="#">후원하기</a>

</div>

<div class="section">

<h2>소개</h2>

<p>
평일 밤 9시부터 새벽 3시까지 방송하는 강치타입니다.<br>
게임 / 소통 / 다양한 콘텐츠 방송합니다.
</p>

</div>

</body>
</html>
