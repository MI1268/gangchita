<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강치타 LIVE | 통제불가 방송</title>

<style>
    /* 1. 기본 셋팅 및 배경 */
    body {
        margin: 0;
        background: radial-gradient(circle at top right, #1e1e2e, #09090b); /* 깊이감 있는 배경 */
        color: #efeff1;
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        line-height: 1.6;
    }

    /* 2. 배너 섹션 (그라데이션 겹치기) */
    .banner-container {
        position: relative;
        width: 100%;
        height: 350px;
        overflow: hidden;
    }
    .banner-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.7); /* 이미지를 살짝 어둡게 해서 글자를 돋보이게 함 */
    }
    .banner-container::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 150px;
        background: linear-gradient(transparent, #09090b); /* 배너 하단 자연스러운 사라짐 */
    }
    .banner-overlay {
        position: absolute;
        bottom: 40px;
        left: 50px;
        z-index: 2;
        font-size: 24px;
        font-weight: 800;
        color: #ff4ef2; /* 포인트 컬러 */
        text-shadow: 0 0 15px rgba(255, 78, 242, 0.8);
        background: rgba(0,0,0,0.4);
        padding: 10px 25px;
        border-left: 5px solid #ff4ef2;
        border-radius: 4px;
    }

    /* 3. 프로필 & 버튼 통합 영역 (유리 효과) */
    .container {
        max-width: 1100px;
        margin: -60px auto 40px; /* 배너 위로 살짝 걸치게 */
        position: relative;
        z-index: 10;
        padding: 0 20px;
    }

    .main-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px); /* 유리 효과 */
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .profile-info { display: flex; align-items: center; gap: 25px; }
    .profile-img {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 3px solid #9147ff;
        box-shadow: 0 0 20px rgba(145, 71, 255, 0.5);
    }

    .name-tag h1 { margin: 0; font-size: 32px; letter-spacing: -1px; }
    .live-badge {
        background: #eb0400;
        padding: 2px 10px;
        border-radius: 4px;
        font-size: 13px;
        vertical-align: middle;
        margin-left: 10px;
        animation: pulse 1.5s infinite;
    }

    .stats-row { display: flex; gap: 20px; margin-top: 10px; color: #adadb8; font-size: 14px; }

    /* 4. 세련된 버튼들 */
    .button-group { display: flex; gap: 12px; margin-top: 20px; }
    .btn {
        padding: 12px 24px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.3s;
        border: 1px solid rgba(255,255,255,0.1);
        color: white;
        background: rgba(255,255,255,0.1);
    }
    .btn:hover {
        background: #9147ff;
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(145, 71, 255, 0.4);
    }
    .btn.primary { background: #9147ff; border: none; }

    /* 5. 방송 메인 영역 */
    .stream-section {
        background: #18181b;
        border-radius: 20px;
        padding: 25px;
        margin-top: 30px;
        border: 1px solid rgba(255,255,255,0.05);
    }
    .stream-section h2 { font-size: 18px; color: #adadb8; margin-top: 0; margin-bottom: 20px; }
    .video-placeholder {
        width: 100%;
        border-radius: 12px;
        transition: 0.4s;
        cursor: pointer;
        display: block;
    }
    .video-placeholder:hover { filter: brightness(1.1); }

    /* 애니메이션 */
    @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
    }
</style>
</head>
<body>

<div class="banner-container">
    <img src="https://github.com/MI1268/gangchita/blob/main/%EB%B0%B0%EB%84%882.png?raw=true" alt="배너">
    <div class="banner-overlay">📢 매니저 급구! 공지 확인 후 연락주세요 🐾</div>
</div>

<div class="container">
    <div class="main-card">
        <div class="profile-info">
            <img class="profile-img" src="https://github.com/MI1268/gangchita/blob/main/%ED%94%84%EB%A1%9C%ED%95%84.png?raw=true" alt="프로필">
            <div class="name-tag">
                <h1>강치타 <span class="live-badge">LIVE</span></h1>
                <div class="stats-row">
                    <span>👁‍🗨 7,800</span>
                    <span>⭐ 96,000</span>
                    <span>⏰ 21:00 ~ 03:00</span>
                </div>
            </div>
        </div>

        <div class="button-group">
            <a class="btn primary" href="#">팡팡TV</a>
            <a class="btn" href="https://mi1268.github.io/you/#">유튜브</a>
            <a class="btn" href="#">디스코드</a>
            <a class="btn" href="#">후원하기</a>
        </div>
    </div>

    <div class="stream-section">
        <h2>실시간 스트리밍</h2>
        <img class="video-placeholder" src="https://github.com/MI1268/gangchita/blob/main/%EB%9D%BC%EC%9D%B4%EB%B8%8C.png?raw=true" alt="방송 화면">
    </div>
</div>

</body>
</html>
