<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강치타 스트리밍 페이지</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f0f14;
    color:white;
    text-align:center;
}

.header{
    padding:60px 20px;
}

.profile-img{
    width:140px;
    border-radius:50%;
    border:4px solid #7c5cff;
}

.name{
    font-size:36px;
    margin-top:20px;
}

.desc{
    color:#aaa;
    margin-top:10px;
}

.stats{
    margin-top:30px;
    font-size:18px;
}

.links{
    margin-top:40px;
}

.button{
    display:block;
    width:220px;
    margin:10px auto;
    padding:14px;
    background:#7c5cff;
    color:white;
    text-decoration:none;
    border-radius:10px;
    transition:0.2s;
}

.button:hover{
    background:#9a82ff;
}
</style>
</head>

<body>

<div class="header">

<img class="profile-img" src="profile.png">

<div class="name">강치타</div>

<div class="desc">
치지직 스트리머 🎮  
평일 밤 9시 ~ 새벽 3시 방송
</div>

<div class="stats">
👥 평균 시청자 : 7,900명<br>
❤️ 팔로워 : 90,000
</div>

<div class="links">

<a class="button" href="#">치지직 방송 바로가기</a>

<a class="button" href="#">유튜브</a>

<a class="button" href="#">디스코드</a>

<a class="button" href="#">후원하기</a>

</div>

</div>

</body>
</html>
