<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강치타 LIVE</title>

<style>

body{
margin:0;
background:#0e0e10;
color:white;
font-family:Arial;
}

/* 배너 */

.banner{
width:100%;
height:420px;
object-fit:cover;
}

/* 프로필 영역 */

.profile-box{
display:flex;
align-items:center;
gap:20px;
padding:20px 40px;
background:#18181b;
}

.profile-img{
width:90px;
height:90px;
border-radius:50%;
border:4px solid #9147ff;
object-fit:cover;
}

.name{
font-size:28px;
font-weight:bold;
}

.live{
background:red;
padding:5px 10px;
margin-left:10px;
border-radius:6px;
font-size:14px;
}

/* 통계 */

.stats{
display:flex;
gap:40px;
margin-top:10px;
color:#aaa;
}

/* 버튼 */

.buttons{
padding:30px 40px;
display:flex;
gap:15px;
}

.btn{
background:#9147ff;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
}

.btn:hover{
background:#a970ff;
}

/* 방송 영역 */

.stream{
padding:40px;
}

.stream iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<img class="banner" src="banner.webp">

<div class="profile-box">

<img class="profile-img" src="profile.webp">

<div>

<div class="name">
강치타
<span class="live">LIVE</span>
</div>

<div class="stats">
<div>평균 시청자 3,000</div>
<div>팔로워 80,000</div>
<div>방송시간 21:00 ~ 03:00</div>
</div>

</div>

</div>

<div class="buttons">

<a class="btn" href="#">치지직 방송</a>
<a class="btn" href="#">유튜브</a>
<a class="btn" href="#">디스코드</a>
<a class="btn" href="#">후원</a>

</div>

<div class="stream">

<h2>LIVE STREAM</h2>

<iframe src=""></iframe>

</div>

</body>
</html>
